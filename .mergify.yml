# Mergify merge queue configuration
#
# No human approval required by design (ADR-041). Quality is enforced by:
# 1. Automated review bots (Copilot, dev-team agents) produce review threads
# 2. The merge skill addresses and resolves ALL threads before merge
# 3. CI checks must pass with no pending or failed checks
#
# Thread resolution (#review-threads-unresolved = 0) is the quality gate,
# not approval count. A human can still block any PR by opening a review
# thread — the merge skill must resolve it before proceeding.
#
# See also: ADR-040 (reviewer-agnostic merge), ADR-041 (no-approval design)

queue_rules:
  - name: default
    merge_method: squash
    merge_conditions:
      - base = main
      - "#check-success >= 1"
      - "#check-pending = 0"
      - "#check-failure = 0"
      # Quality gate: all review threads must be resolved. No approval
      # count required — see ADR-041 for rationale.
      - "#review-threads-unresolved = 0"
    commit_message_template: |
      {{ title }} (#{{ number }})

      {{ body | get_section("## Summary", "") }}

pull_request_rules:
  - name: auto-queue when CI passes
    conditions:
      - base = main
      - "#check-success >= 1"
      - "#check-pending = 0"
      - "#check-failure = 0"
      - "#review-threads-unresolved = 0"
    actions:
      queue:
        name: default
