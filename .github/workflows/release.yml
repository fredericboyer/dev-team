name: Release

on:
  push:
    tags: ['v[0-9]*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm install

      - name: Validate semver tag matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${TAG_REF#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
        env:
          TAG_REF: ${{ github.ref_name }}

      - name: Build
        run: npm run build

      - name: Run full test suite
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Validate agents
        run: node scripts/validate-agents.js

      - name: Validate hooks
        run: node scripts/validate-hooks.js

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog for this version
        run: |
          VERSION="${TAG_REF#v}"
          NOTES=$(awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { found=1; next }
            /^## \[/ { if(found) exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "::warning::No changelog entry found for version ${VERSION}"
            echo "Release ${VERSION}" > /tmp/release-notes.md
          else
            echo "$NOTES" | sed '/./,$!d' > /tmp/release-notes.md
          fi
        env:
          TAG_REF: ${{ github.ref_name }}

      - name: Create GitHub Release
        run: gh release create "$TAG_REF" --title "$TAG_REF" --notes-file /tmp/release-notes.md
        env:
          TAG_REF: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
